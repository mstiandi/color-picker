<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>取色器 - 一键提取配色灵感</title>
  <link rel="manifest" href="manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #666;
      --border: #e0e0e0;
      --accent: #1a1a2e;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
      padding-top: 16px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: #f5f5f5;
    }

    .drop-zone .icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .drop-zone .hint {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .drop-zone .sub-hint {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .preview-area {
      display: none;
    }

    .preview-area.visible {
      display: flex;
      justify-content: center;
    }

    .preview-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .preview-container img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: var(--shadow);
      display: block;
    }

    .dot-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .color-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      box-shadow: 0 0 8px rgba(0,0,0,0.35), 0 0 0 3px rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s;
      z-index: 2;
    }

    .color-dot:hover,
    .color-dot.active {
      transform: translate(-50%, -50%) scale(1.6);
      z-index: 3;
    }

    .color-dot .dot-label {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .color-dot:hover .dot-label,
    .color-dot.active .dot-label {
      opacity: 1;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .color-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .color-card:active {
      transform: scale(0.96);
    }

    .color-card .swatch {
      height: 80px;
    }

    .color-card .info {
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .color-card .name-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .color-card .hex-code {
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .color-card .taobao-link {
      font-size: 11px;
      color: #ff6b35;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid #ff6b3530;
      border-radius: 12px;
      margin-top: 2px;
    }

    .color-card .taobao-link:active {
      background: #ff6b3510;
    }

    .copied-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }

    .copied-toast.show {
      opacity: 1;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .btn:focus-visible,
    .color-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(250,250,250,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .loading-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      margin-top: 12px;
      font-size: 14px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>取色器</h1>
      <p>上传图片，自动提取配色方案</p>
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="icon">🎨</div>
      <div class="hint">点击上传或拖拽图片到此处</div>
      <div class="sub-hint">支持 JPG / PNG / WebP，也可 Ctrl+V 粘贴</div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    </div>

    <div class="preview-area" id="previewArea">
      <div class="preview-container" id="previewContainer">
        <img id="previewImage" alt="预览">
        <div class="dot-overlay" id="dotOverlay"></div>
      </div>
    </div>

    <div class="palette" id="palette"></div>

    <div class="actions" id="actions" style="display:none;">
      <button class="btn btn-primary" id="copyAllBtn">复制全部配色</button>
      <button class="btn btn-secondary" id="resetBtn">重新上传</button>
    </div>
  </div>

  <div class="copied-toast" id="toast"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">正在分析图片...</p>
  </div>

      { name: '淡紫', r: 230, g: 220, b: 240 }, { name: '藕荷色', r: 200, g: 180, b: 190 },
      { name: '肤粉', r: 250, g: 210, b: 200 }, { name: '蜜瓜橙', r: 255, g: 160, b: 130 },
      { name: '落日橘', r: 255, g: 120, b: 60 }, { name: '拿铁棕', r: 180, g: 140, b: 110 },
      { name: '檀木棕', r: 110, g: 70, b: 40 }, { name: '烟熏玫瑰', r: 190, g: 130, b: 140 },
      { name: '多巴胺粉', r: 255, g: 50, b: 140 }, { name: '静谧蓝', r: 155, g: 200, b: 230 },
      { name: '元气橘', r: 255, g: 140, b: 60 }, { name: '森系绿', r: 100, g: 160, b: 100 },
      { name: '灰调紫', r: 160, g: 140, b: 170 }, { name: '深海蓝', r: 20, g: 50, b: 110 },

    function colorDistSq(a, b) {
      const dr = a[0] - b[0], dg = a[1] - b[1], db = a[2] - b[2];
      return 2 * dr * dr + 4 * dg * dg + 3 * db * db;
    }

    function colorDistance(a, b) {
      const dr = a[0] - b.r, dg = a[1] - b.g, db = a[2] - b.b;
      return 2 * dr * dr + 4 * dg * dg + 3 * db * db;
    }

    function findNearestColor(rgb) {
      let best = COLOR_NAMES[0], bestDist = Infinity;
      for (const c of COLOR_NAMES) {
        const d = colorDistance(rgb, c);
        if (d < bestDist) { bestDist = d; best = c; }
      }
      return best;
    }

    function samplePixels(img, count) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width = 240;
      const h = canvas.height = Math.round(img.naturalHeight / img.naturalWidth * 240);
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const pixels = [];
      const step = Math.sqrt(w * h / count);
      const cols = Math.round(w / step), rows = Math.round(h / step);
      for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
          const cx = (gx + 0.3 + Math.random() * 0.4) / cols;
          const cy = (gy + 0.3 + Math.random() * 0.4) / rows;
          const px = Math.floor(cx * w), py = Math.floor(cy * h);
          const idx = (Math.min(py, h - 1) * w + Math.min(px, w - 1)) * 4;
          pixels.push({ rgb: [data[idx], data[idx + 1], data[idx + 2]], x: cx, y: cy });
          if (pixels.length >= count) return pixels;
        }
      }
      return pixels;
    }

    function histogramExtract(pixels, n) {
      const Q = 8;
      const bins = new Map();

      for (const p of pixels) {
        const qr = Math.floor(p.rgb[0] / Q);
        const qg = Math.floor(p.rgb[1] / Q);
        const qb = Math.floor(p.rgb[2] / Q);
        const key = (qr << 10) | (qg << 5) | qb;
        const e = bins.get(key);
        if (e) {
          e.count++;
          e.sumR += p.rgb[0]; e.sumG += p.rgb[1]; e.sumB += p.rgb[2];
          e.sumX += p.x; e.sumY += p.y;
          if (p.isPerson) e.personCount++;
        } else {
          bins.set(key, {
            count: 1,
            sumR: p.rgb[0], sumG: p.rgb[1], sumB: p.rgb[2],
            sumX: p.x, sumY: p.y,
            personCount: p.isPerson ? 1 : 0
          });
        }
      }

      const total = pixels.length;
      const entries = [];
      for (const [key, e] of bins) {
        if (e.count / total < 0.005) continue;
        entries.push({
          rgb: [Math.round(e.sumR / e.count), Math.round(e.sumG / e.count), Math.round(e.sumB / e.count)],
          x: e.sumX / e.count,
          y: e.sumY / e.count,
          count: e.count,
          personCount: e.personCount
        });
      }

      entries.sort((a, b) => b.count - a.count);

      for (let t = 60; t >= 10; t -= 5) {
        const threshSq = t * t;
        const selected = [];
        for (const e of entries) {
          let tooClose = false;
          for (const s of selected) {
            if (colorDistSq(e.rgb, s.rgb) < threshSq) { tooClose = true; break; }
          }
          if (!tooClose) selected.push(e);
        }
        if (selected.length >= n) return selected.slice(0, n);
      }

      return entries.slice(0, n);
    }

    function isSkinTone(rgb) {
      const [r, g, b] = rgb;
      if (r < 120 || g < 60 || b < 40 || r > 255 || g > 240 || b > 235) return false;
      if (r <= g || r <= b) return false;
      const rg = r - g, rb = r - b;
      if (rg < 5 || rg > 120 || rb < 10 || rb > 150) return false;
      if (Math.abs(g - b) > 60) return false;
      return true;
    }

    function computeColorPositions(colors) {
      return colors.map(c => ({ x: c.x, y: c.y, color: c }));
    }

    function renderDots(dots) {
      dotOverlay.innerHTML = '';
      dots.forEach((d, i) => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.left = (d.x * 100) + '%';
        dot.style.top = (d.y * 100) + '%';
        dot.style.background = d.color.hex;
        dot.dataset.index = i;
        dot.setAttribute('aria-label', d.color.name + ' ' + d.color.hex);

        const label = document.createElement('span');
        label.className = 'dot-label';
        label.textContent = d.color.name;
        dot.appendChild(label);

        dot.addEventListener('mouseenter', () => {
          const cards = palette.querySelectorAll('.color-card');
          cards.forEach(c => { c.style.transform = c.dataset.index == i ? 'scale(1.03)' : ''; });
        });
        dot.addEventListener('mouseleave', () => {
          palette.querySelectorAll('.color-card').forEach(c => { c.style.transform = ''; });
        });
        dot.addEventListener('click', (e) => {
          e.stopPropagation();
          copyColor(d.color.name + ' ' + d.color.hex.toUpperCase());
        });

        dotOverlay.appendChild(dot);
      });
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    async function copyColor(hex) {
      try {
        await navigator.clipboard.writeText(hex);
        showToast('已复制 ' + hex.toUpperCase());
      } catch {
        showToast('复制失败，请手动复制');
      }
    }

    function renderPalette(colors) {
      currentColors = colors;
      palette.innerHTML = '';
      colors.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'color-card';
        card.dataset.index = i;

        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.background = c.hex;

        const info = document.createElement('div');
        info.className = 'info';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'name-label';
        nameSpan.textContent = c.name;

        const hexSpan = document.createElement('span');
        hexSpan.className = 'hex-code';
        hexSpan.textContent = c.hex.toUpperCase();

        const tbLink = document.createElement('a');
        tbLink.className = 'taobao-link';
        tbLink.href = 'https://s.taobao.com/search?q=' + encodeURIComponent(c.name);
        tbLink.target = '_blank';
        tbLink.textContent = '搜淘宝同色 →';
        tbLink.addEventListener('click', (e) => e.stopPropagation());

        card.addEventListener('mouseenter', () => {
          const dots = dotOverlay.querySelectorAll('.color-dot');
          dots.forEach(d => { d.classList.toggle('active', d.dataset.index == i); });
        });
        card.addEventListener('mouseleave', () => {
          dotOverlay.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        });

        card.addEventListener('click', () => copyColor(c.name + ' ' + c.hex.toUpperCase()));

        info.appendChild(nameSpan);
        info.appendChild(hexSpan);
        info.appendChild(tbLink);
        card.appendChild(swatch);
        card.appendChild(info);
        palette.appendChild(card);
      });
      actions.style.display = 'flex';
    }

    async function getPersonMask(img) {
      const result = await segmentImage(img);
      return {
        mask: result.mask,
        personRatio: result.personRatio,
        hasPerson: result.personRatio > 0.05
      };
    }

    function samplePixelsWeighted(img, count, mask, hasPerson) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width = 240;
      const h = canvas.height = Math.round(img.naturalHeight / img.naturalWidth * 240);
      if (h < 1) return [];
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const maskData = mask ? mask.data : null;

      if (!hasPerson || !maskData) {
        return samplePixels(img, count);
      }

      function isPerson(idx) { return maskData[idx] > 128; }
      function isSkin(idx) { return isSkinTone([data[idx], data[idx + 1], data[idx + 2]]); }

      const step = Math.sqrt(w * h / count);
      const cols = Math.round(w / step);
      const rows = Math.round(h / step);
      const totalCells = cols * rows;

      const personCellCount = Math.round(totalCells * 0.7);
      const allCells = [];
      for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
          allCells.push({ gx, gy });
        }
      }
      for (let i = allCells.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allCells[i], allCells[j]] = [allCells[j], allCells[i]];
      }
      const personCells = allCells.slice(0, personCellCount);
      const bgCells = allCells.slice(personCellCount);

      function sampleCell(gx, gy, accept) {
        for (let r = 0; r < 15; r++) {
          const cx = (gx + 0.3 + Math.random() * 0.4) / cols;
          const cy = (gy + 0.3 + Math.random() * 0.4) / rows;
          const px = Math.min(Math.floor(cx * w), w - 1);
          const py = Math.min(Math.floor(cy * h), h - 1);
          const idx = (py * w + px) * 4;
          if (accept(idx)) {
            return { rgb: [data[idx], data[idx + 1], data[idx + 2]], x: cx, y: cy };
          }
        }
        return null;
      }

      const pixels = [];

      for (const cell of personCells) {
        const p = sampleCell(cell.gx, cell.gy, (idx) => isPerson(idx) && !isSkin(idx));
        if (p) { p.isPerson = true; pixels.push(p); }
      }

      for (const cell of bgCells) {
        const p = sampleCell(cell.gx, cell.gy, (idx) => !isPerson(idx));
        if (p) { p.isPerson = false; pixels.push(p); }
      }

      if (pixels.length < count) {
        const step2 = Math.sqrt(w * h / (count * 4));
        const cols2 = Math.round(w / step2);
        const rows2 = Math.round(h / step2);
        for (let gy = 0; gy < rows2 && pixels.length < count; gy++) {
          for (let gx = 0; gx < cols2 && pixels.length < count; gx++) {
            const cx = (gx + Math.random()) / cols2;
            const cy = (gy + Math.random()) / rows2;
            const px = Math.min(Math.floor(cx * w), w - 1);
            const py = Math.min(Math.floor(cy * h), h - 1);
            const idx = (py * w + px) * 4;
            if (isPerson(idx) && isSkin(idx)) continue;
            pixels.push({
              rgb: [data[idx], data[idx + 1], data[idx + 2]],
              x: cx, y: cy,
              isPerson: isPerson(idx)
            });
          }
        }
      }

      return pixels.slice(0, count);
    }

    function handleFile(file) {
      if (!file || !file.type.match(/^image\/(jpeg|png|webp)$/)) {
        showToast('请上传 JPG、PNG 或 WebP 格式的图片');
        return;
      }

      const MAX_SIZE = 20 * 1024 * 1024;
      if (file.size > MAX_SIZE) {
        showToast('图片文件过大，请上传小于 20MB 的图片');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = async () => {
          loadingOverlay.classList.add('visible');

          try {
            let mask = null, hasPerson = false;

            try {
              const segResult = await getPersonMask(img);
              mask = segResult.mask;
              hasPerson = segResult.hasPerson;
            } catch (e) {
              console.error('MediaPipe segmentation failed, falling back to uniform sampling:', e.message);
            }

            const pixels = samplePixelsWeighted(img, 3000, mask, hasPerson);

            let picked;
            if (hasPerson) {
              const personPx = pixels.filter(p => p.isPerson);
              const bgPx = pixels.filter(p => !p.isPerson);
              const personColors = histogramExtract(personPx, 5);
              const bgColors = histogramExtract(bgPx, 2);

              picked = [...personColors];
              for (const bc of bgColors) {
                let dup = false;
                for (const pc of personColors) {
                  if (colorDistSq(bc.rgb, pc.rgb) < 35 * 35) { dup = true; break; }
                }
                if (!dup) picked.push(bc);
              }

              if (picked.length < 6) {
                const all = histogramExtract(pixels, 10);
                const used = new Set(picked);
                for (const c of all) {
                  if (picked.length >= 6) break;
                  if (used.has(c)) continue;
                  let dup = false;
                  for (const s of picked) {
                    if (colorDistSq(c.rgb, s.rgb) < 25 * 25) { dup = true; break; }
                  }
                  if (!dup) { picked.push(c); used.add(c); }
                }
              }
              picked = picked.slice(0, 6);
            } else {
              picked = histogramExtract(pixels, 6);
            }

            for (const c of picked) {
              let bestD = Infinity, bx = c.x, by = c.y;
              for (const p of pixels) {
                const d = colorDistSq(c.rgb, p.rgb);
                if (d < bestD) { bestD = d; bx = p.x; by = p.y; }
              }
              c.x = bx; c.y = by;
            }

            const colors = picked.map(c => {
              const match = findNearestColor(c.rgb);
              return {
                hex: rgbToHex(c.rgb[0], c.rgb[1], c.rgb[2]),
                rgb: c.rgb,
                name: match.name,
                x: c.x,
                y: c.y
              };
            });

            previewImage.onload = () => {
              try {
                const dots = computeColorPositions(colors);
                renderPalette(colors);
                renderDots(dots);
                previewArea.classList.add('visible');
                dropZone.style.display = 'none';
                loadingOverlay.classList.remove('visible');
              } catch (e) {
                console.error('Failed to render preview:', e);
                loadingOverlay.classList.remove('visible');
              }
            };
            previewImage.src = e.target.result;
          } catch (e) {
            console.error('Failed to process image:', e);
            showToast('无法提取颜色，请尝试其他图片');
            loadingOverlay.classList.remove('visible');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function reset() {
      currentColors = [];
      palette.innerHTML = '';
      dotOverlay.innerHTML = '';
      previewArea.classList.remove('visible');
      previewImage.src = '';
      dropZone.style.display = '';
      actions.style.display = 'none';
      fileInput.value = '';
      loadingOverlay.classList.remove('visible');
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    copyAllBtn.addEventListener('click', () => {
      const allText = currentColors.map(c => c.name + ' ' + c.hex.toUpperCase()).join('\n');
      copyColor(allText);
    });

    resetBtn.addEventListener('click', reset);

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.match(/^image\//)) {
          e.preventDefault();
          handleFile(item.getAsFile());
          return;
        }
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
