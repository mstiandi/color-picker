<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>取色器 - 一键提取配色灵感</title>
  <link rel="manifest" href="manifest.json">
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #666;
      --border: #e0e0e0;
      --accent: #1a1a2e;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
      padding-top: 16px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--accent);
      background: #f5f5f5;
    }

    .drop-zone .icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .drop-zone .hint {
      font-size: 15px;
      color: var(--text-secondary);
    }

    .drop-zone .sub-hint {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
    }

    .drop-zone input[type="file"] {
      display: none;
    }

    .preview-area {
      display: none;
    }

    .preview-area.visible {
      display: flex;
      justify-content: center;
    }

    .preview-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .preview-container img {
      max-width: 100%;
      max-height: 300px;
      border-radius: 12px;
      object-fit: contain;
      box-shadow: var(--shadow);
      display: block;
    }

    .dot-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .color-dot {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2.5px solid #fff;
      box-shadow: 0 0 8px rgba(0,0,0,0.35), 0 0 0 3px rgba(0,0,0,0.08);
      transform: translate(-50%, -50%);
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s;
      z-index: 2;
    }

    .color-dot:hover,
    .color-dot.active {
      transform: translate(-50%, -50%) scale(1.6);
      z-index: 3;
    }

    .color-dot .dot-label {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .color-dot:hover .dot-label,
    .color-dot.active .dot-label {
      opacity: 1;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .color-card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .color-card:active {
      transform: scale(0.96);
    }

    .color-card .swatch {
      height: 80px;
    }

    .color-card .info {
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .color-card .name-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .color-card .hex-code {
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .color-card .taobao-link {
      font-size: 11px;
      color: #ff6b35;
      text-decoration: none;
      padding: 4px 10px;
      border: 1px solid #ff6b3530;
      border-radius: 12px;
      margin-top: 2px;
    }

    .color-card .taobao-link:active {
      background: #ff6b3510;
    }

    .copied-toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: #fff;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 10;
    }

    .copied-toast.show {
      opacity: 1;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.7;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>取色器</h1>
      <p>上传图片，自动提取配色方案</p>
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="icon">🎨</div>

      <div class="sub-hint">支持 JPG / PNG / WebP，也可 Ctrl+V 粘贴</div>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    </div>

    <div class="preview-area" id="previewArea">
      <div class="preview-container" id="previewContainer">
        <img id="previewImage" alt="预览">
        <div class="dot-overlay" id="dotOverlay"></div>
      </div>
    </div>

    <div class="palette" id="palette"></div>

    <div class="actions" id="actions" style="display:none;">
      <button class="btn btn-primary" id="copyAllBtn">复制全部配色</button>
      <button class="btn btn-secondary" id="resetBtn">重新上传</button>

  <div class="copied-toast" id="toast"></div>

      { name: '淡紫', r: 230, g: 220, b: 240 }, { name: '藕荷色', r: 200, g: 180, b: 190 },
      { name: '肤粉', r: 250, g: 210, b: 200 }, { name: '蜜瓜橙', r: 255, g: 160, b: 130 },
      { name: '落日橘', r: 255, g: 120, b: 60 }, { name: '拿铁棕', r: 180, g: 140, b: 110 },
      { name: '檀木棕', r: 110, g: 70, b: 40 }, { name: '烟熏玫瑰', r: 190, g: 130, b: 140 },
      { name: '多巴胺粉', r: 255, g: 50, b: 140 }, { name: '静谧蓝', r: 155, g: 200, b: 230 },
      { name: '元气橘', r: 255, g: 140, b: 60 }, { name: '森系绿', r: 100, g: 160, b: 100 },
      { name: '灰调紫', r: 160, g: 140, b: 170 }, { name: '深海蓝', r: 20, g: 50, b: 110 },
    ];

    function colorDistance(a, b) {
      const dr = a[0] - b.r, dg = a[1] - b.g, db = a[2] - b.b;
      return dr * dr + dg * dg + db * db;
    }

    function findNearestColor(rgb) {
      let best = COLOR_NAMES[0], bestDist = Infinity;
      for (const c of COLOR_NAMES) {
        const d = colorDistance(rgb, c);
        if (d < bestDist) { bestDist = d; best = c; }
      }
      return best;
    }

    function samplePixels(img, count) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const w = canvas.width = 240;
      const h = canvas.height = Math.round(img.naturalHeight / img.naturalWidth * 240);
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const pixels = [];
      const step = Math.sqrt(w * h / count);
      const cols = Math.round(w / step), rows = Math.round(h / step);
      for (let gy = 0; gy < rows; gy++) {
        for (let gx = 0; gx < cols; gx++) {
          const cx = (gx + 0.3 + Math.random() * 0.4) / cols;
          const cy = (gy + 0.3 + Math.random() * 0.4) / rows;
          const px = Math.floor(cx * w), py = Math.floor(cy * h);
          const idx = (Math.min(py, h - 1) * w + Math.min(px, w - 1)) * 4;
          pixels.push({ rgb: [data[idx], data[idx + 1], data[idx + 2]], x: cx, y: cy });
          if (pixels.length >= count) return pixels;
        }
      }
      return pixels;
    }

    function kmeans(pixels, k, iters) {
      let centers = [];
      for (let i = 0; i < k; i++) {
        const p = pixels[Math.floor(Math.random() * pixels.length)];
        centers.push({ rgb: [p.rgb[0], p.rgb[1], p.rgb[2]] });
      }
      for (let iter = 0; iter < iters; iter++) {
        const groups = Array.from({ length: k }, () => []);
        for (const p of pixels) {
          let best = 0, bestDist = Infinity;
          for (let j = 0; j < k; j++) {
            const dr = p.rgb[0] - centers[j].rgb[0];
            const dg = p.rgb[1] - centers[j].rgb[1];
            const db = p.rgb[2] - centers[j].rgb[2];
            const d = dr * dr + dg * dg + db * db;
            if (d < bestDist) { bestDist = d; best = j; }
          }
          groups[best].push(p);
        }
        let changed = false;
        for (let j = 0; j < k; j++) {
          if (groups[j].length === 0) { centers[j] = { rgb: [0, 0, 0] }; continue; }
          let sr = 0, sg = 0, sb = 0;
          for (const p of groups[j]) { sr += p.rgb[0]; sg += p.rgb[1]; sb += p.rgb[2]; }
          const nr = Math.round(sr / groups[j].length);
          const ng = Math.round(sg / groups[j].length);
          const nb = Math.round(sb / groups[j].length);
          if (nr !== centers[j].rgb[0] || ng !== centers[j].rgb[1] || nb !== centers[j].rgb[2]) changed = true;
          centers[j].rgb = [nr, ng, nb];
        }
        if (!changed) break;
      }
      const result = [];
      for (let j = 0; j < k; j++) {
        const group = [];
        for (const p of pixels) {
          const dr = p.rgb[0] - centers[j].rgb[0];
          const dg = p.rgb[1] - centers[j].rgb[1];
          const db = p.rgb[2] - centers[j].rgb[2];
          if (dr * dr + dg * dg + db * db < 10000) group.push(p);
        }
        if (group.length > 0) {
          let sx = 0, sy = 0;
          for (const p of group) { sx += p.x; sy += p.y; }
          result.push({
            rgb: centers[j].rgb,
            x: sx / group.length,
            y: sy / group.length,
            size: group.length
          });
        }
      }
      result.sort((a, b) => b.size - a.size);
      return result;
    }

    function isSkinTone(rgb) {
      const [r, g, b] = rgb;
      if (r < 120 || g < 60 || b < 40 || r > 255 || g > 240 || b > 235) return false;
      if (r <= g || r <= b) return false;
      const rg = r - g, rb = r - b;
      if (rg < 5 || rg > 120 || rb < 10 || rb > 150) return false;
      if (Math.abs(g - b) > 60) return false;
      return true;
    }

    function pickDistinct(clusters, n) {
      const remaining = clusters.filter(c => !isSkinTone(c.rgb));
      n = Math.min(n, remaining.length || clusters.length);
      if (remaining.length === 0) {
        return clusters.slice(0, n).map(c => ({ rgb: c.rgb, x: c.x, y: c.y }));
      }
      const selected = [remaining[0]];
      while (selected.length < n) {
        let best = null, bestDist = -1;
        for (const c of remaining) {
          if (selected.includes(c)) continue;
          let minDist = Infinity;
          for (const sel of selected) {
            const dr = c.rgb[0] - sel.rgb[0], dg = c.rgb[1] - sel.rgb[1], db = c.rgb[2] - sel.rgb[2];
            minDist = Math.min(minDist, dr * dr + dg * dg + db * db);
          }
          if (minDist > bestDist) { bestDist = minDist; best = c; }
        }
        if (best) selected.push(best); else break;
      }
      return selected.map(c => ({ rgb: c.rgb, x: c.x, y: c.y }));
    }

    function computeColorPositions(colors, clusters) {
      return colors.map(pc => {
        let best = clusters[0], bestDist = Infinity;
        for (const c of clusters) {
          const dr = pc.rgb[0] - c.rgb[0], dg = pc.rgb[1] - c.rgb[1], db = pc.rgb[2] - c.rgb[2];
          const d = dr * dr + dg * dg + db * db;
          if (d < bestDist) { bestDist = d; best = c; }
        }
        return { x: best.x, y: best.y, color: pc };
      });
    }

    function renderDots(dots) {
      dotOverlay.innerHTML = '';
      dots.forEach((d, i) => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.left = (d.x * 100) + '%';
        dot.style.top = (d.y * 100) + '%';
        dot.style.background = d.color.hex;
        dot.dataset.index = i;

        const label = document.createElement('span');
        label.className = 'dot-label';
        label.textContent = d.color.name;
        dot.appendChild(label);

        dot.addEventListener('mouseenter', () => {
          const cards = palette.querySelectorAll('.color-card');
          cards.forEach(c => { c.style.transform = c.dataset.index == i ? 'scale(1.03)' : ''; });
        });
        dot.addEventListener('mouseleave', () => {
          palette.querySelectorAll('.color-card').forEach(c => { c.style.transform = ''; });
        });
        dot.addEventListener('click', (e) => {
          e.stopPropagation();
          copyColor(d.color.name + ' ' + d.color.hex.toUpperCase());
        });

        dotOverlay.appendChild(dot);
      });
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    async function copyColor(hex) {
      try {
        await navigator.clipboard.writeText(hex);
        showToast('已复制 ' + hex.toUpperCase());
      } catch {
        const ta = document.createElement('textarea');
        ta.value = hex.toUpperCase();
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制 ' + hex.toUpperCase());
      }
    }

    function renderPalette(colors) {
      currentColors = colors;
      palette.innerHTML = '';
      colors.forEach((c, i) => {
        const card = document.createElement('div');
        card.className = 'color-card';
        card.dataset.index = i;

        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.background = c.hex;

        const info = document.createElement('div');
        info.className = 'info';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'name-label';
        nameSpan.textContent = c.name;

        const hexSpan = document.createElement('span');
        hexSpan.className = 'hex-code';
        hexSpan.textContent = c.hex.toUpperCase();

        const tbLink = document.createElement('a');
        tbLink.className = 'taobao-link';
        tbLink.href = 'https://s.taobao.com/search?q=' + encodeURIComponent(c.name);
        tbLink.target = '_blank';
        tbLink.textContent = '搜淘宝同色 →';
        tbLink.addEventListener('click', (e) => e.stopPropagation());

        card.addEventListener('mouseenter', () => {
          const dots = dotOverlay.querySelectorAll('.color-dot');
          dots.forEach(d => { d.classList.toggle('active', d.dataset.index == i); });
        });
        card.addEventListener('mouseleave', () => {
          dotOverlay.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        });

        card.addEventListener('click', () => copyColor(c.name + ' ' + c.hex.toUpperCase()));

        info.appendChild(nameSpan);
        info.appendChild(hexSpan);
        info.appendChild(tbLink);
        card.appendChild(swatch);
        card.appendChild(info);
        palette.appendChild(card);
      });
      actions.style.display = 'flex';
    }

    function handleFile(file) {
      if (!file || !file.type.match(/^image\/(jpeg|png|webp)$/)) {
        showToast('请上传 JPG、PNG 或 WebP 格式的图片');
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          try {
            const pixels = samplePixels(img, 3000);
            const clusters = kmeans(pixels, 16, 15);
            const picked = pickDistinct(clusters, 6);
            const colors = picked.map(c => {
              const match = findNearestColor(c.rgb);
              return {
                hex: rgbToHex(c.rgb[0], c.rgb[1], c.rgb[2]),
                rgb: c.rgb,
                name: match.name
              };
            });
            previewImage.onload = () => {
              try {
                const dots = computeColorPositions(colors, clusters);
                renderDots(dots);
              } catch (e) {}
            };
            previewImage.src = e.target.result;
            previewArea.classList.add('visible');
            dropZone.style.display = 'none';
            renderPalette(colors);
          } catch {
            showToast('无法提取颜色，请尝试其他图片');
          }
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function reset() {
      currentColors = [];
      palette.innerHTML = '';
      dotOverlay.innerHTML = '';
      previewArea.classList.remove('visible');
      previewImage.src = '';
      dropZone.style.display = '';
      actions.style.display = 'none';
      fileInput.value = '';
    }

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    copyAllBtn.addEventListener('click', () => {
      const allText = currentColors.map(c => c.name + ' ' + c.hex.toUpperCase()).join('\n');
      copyColor(allText);
    });

    resetBtn.addEventListener('click', reset);

    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.match(/^image\//)) {
          e.preventDefault();
          handleFile(item.getAsFile());
          return;
        }
      }
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
